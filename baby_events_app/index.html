<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="赤ちゃんのイベントを計算するwebアプリです。">
  <title>赤ちゃんイベント計算</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1 class="page-title">赤ちゃんイベント計算</h1>

    <img src="images/family_illust.png" alt="家族のイラスト" class="main-image">

    <section class="form-card">
      <form id="eventForm">
        <div class="form-group">
          <p class="label">性別：</p>
          <label class="radio-label">
            <input type="radio" name="gender" value="boy" checked>
            男の子
          </label>
          <label class="radio-label">
            <input type="radio" name="gender" value="girl">
            女の子
          </label>
        </div>

        <div class="form-group">
          <label for="birthday" class="label">生年月日：</label>
          <input type="date" id="birthday" required>
        </div>

        <button type="submit" class="main-button">計算する</button>
      </form>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
